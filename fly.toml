# fly.toml — https://fly.io/docs/reference/configuration/
# Rename "arcade-games" to your chosen app name (must be globally unique on Fly)

app            = "arcade-games"
primary_region = "mad"          # Madrid — cambia a la región más cercana a tus usuarios

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"   # 256 MB RAM — suficiente para este proyecto
